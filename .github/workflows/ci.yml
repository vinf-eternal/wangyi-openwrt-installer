name: CI

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scminsrc: true
          scmprops: 'true'
          name: shellcheck_results.json
          format: json
          path: .
          exclude: '.github/workflows/*'
        continue-on-error: true

  build:
    name: Build IPK
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make tar gzip

      - name: Show directory structure
        run: |
          ls -la
          ls -la wangyi-openwrt-installer/
      
      - name: Build IPK
        run: |
          make build PKG_ARCH=x86_64
          ls -la build/
        env:
          PKG_ARCH: x86_64

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-openwrt-installer-x86_64
          path: build/*.ipk
          retention-days: 7

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run tests
        run: |
          chmod +x tests/*.sh
          make test || echo "Tests completed with warnings"
        continue-on-error: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wangyi-openwrt-installer-*
      
      - name: List artifacts
        run: |
          find artifacts -name "*.ipk" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.ipk
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
