# wangyi-openwrt-installer configuration file
# Copy to /etc/config/istoreos-installer or /etc/wangyi-openwrt-installer.conf

config installer 'global'
	option enabled '1'
	option log_level 'info'
	option log_file '/tmp/istoreos-install.log'

config download
	option default_url 'https://downloads.istoreos.com/istoreos-x86_64.img'
	option verify_hash '0'
	option resume_download '1'

config device
	option auto_detect '1'
	option target_device ''
	option safe_mode '1'

config safety
	option require_root '1'
	option confirm_write '1'
	option verify_write '1'
